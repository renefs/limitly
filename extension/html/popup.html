<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Website Time Limit</title>
    <style>
        body {
            width: 200px;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            margin: 0;
            text-align: center;
            background-color: #f6f8fa;
            color: #24292f;
        }
        h3 {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 16px;
            color: #24292f;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background-color: #0969da;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0550ae;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background-color: #0d1117;
                color: #c9d1d9;
            }
            h3 {
                color: #ffffff;
            }
            button {
                background-color: #2f81f7;
            }
            button:hover {
                background-color: #1f6feb;
            }
        }
    </style>
</head>
<body>
    <h3>Limitly - Limit your time on websites</h3>
    <button id="optionsBtn" type="button">Open Settings</button>
    <script src="../js/popup.js"></script>
</body>
</html>
